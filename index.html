    :root {

      --text: #f4f7fb;
      --muted: #aeb9c8;
      --soft: #d7deea;
      --accent: #2dd4bf;

      --danger: #ff7b72;
      --ok: #8bd66f;

    }

    * { box-sizing: border-box; }

    html {
      background: var(--bg);
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(45, 212, 191, .12), rgba(8, 11, 16, 0) 260px),

      color: var(--text);
      font-size: 17px;
      line-height: 1.45;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    a { color: inherit; }

    button, a.button {
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .app {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 14px 14px 28px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: -14px -14px 12px;
      padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
      background: rgba(8, 11, 16, .93);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
      line-height: 1.15;
    }

    .offline {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 5px 9px;
      border: 1px solid rgba(139, 214, 111, .42);
      border-radius: 999px;
      color: var(--ok);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .jump-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .day-select {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-size: 18px;
      font-weight: 800;
      padding: 0 12px;
    }

    .summary-toggle {
      min-width: 76px;
      padding: 0 12px;
      background: #243044;
      color: var(--text);
    }

    .notice {
      border: 1px solid rgba(246, 196, 83, .34);
      background: rgba(246, 196, 83, .11);
      color: #ffe2a3;
      border-radius: 8px;
      padding: 10px 12px;
      margin: 12px 0;
      font-size: 15px;
      font-weight: 650;
    }

    .day-card {
      scroll-margin-top: 118px;
      margin: 14px 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .day-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 16px 14px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(45, 212, 191, .14), rgba(246, 196, 83, .08));
    }

    .day-title {
      margin: 0;
      font-size: 25px;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .country {
      margin-top: 4px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
    }

    .quick-main {
      flex: 0 0 auto;
      min-width: 112px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      background: var(--accent);
      color: #06110f;
    }

    .places {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .place {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .035);
      padding: 12px;
    }

    .place.main {
      border-color: rgba(45, 212, 191, .58);
      background: rgba(45, 212, 191, .08);
    }

    .role {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--accent-2);
      font-size: 14px;
      font-weight: 900;
    }

    .fit {
      color: var(--text);
      font-size: 13px;
      font-weight: 850;
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .1);
      white-space: nowrap;
    }

    .name {
      margin: 0 0 3px;
      font-size: 22px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .meta {
      color: var(--muted);
      font-size: 15px;
      font-weight: 650;
      margin-bottom: 10px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
    }

      min-height: 34px;
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border-radius: 999px;
      background: #202b3d;
      color: var(--soft);
      font-size: 14px;
      font-weight: 800;
    }

    .details {
      display: grid;
      gap: 5px;
      margin: 10px 0 12px;
      color: var(--soft);
      font-size: 15px;
    }

    .details b { color: var(--text); }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .nav-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      background: var(--accent);
      color: #06110f;
    }

    .search-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      background: #2a3548;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .summary {
      display: none;
      margin-top: 12px;
    }

    .days.hidden { display: none; }

      margin: 10px 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px;

      margin: 0 0 8px;
      font-size: 20px;

      gap: 5px;
      color: var(--soft);
      font-size: 15px;

      padding: 18px 2px 4px;

      .quick-main { min-width: 98px; }
      .name { font-size: 20px; }

      const mapsQuery = encodeURIComponent(query).replace(/%20/g, "+");
      return {
        role, name, country, city, address, recommended, portion, budget, fit,
        searchUrl: `https://www.google.com/maps/search/?api=1&query=${mapsQuery}`,
        navUrl: `https://www.google.com/maps/dir/?api=1&destination=${mapsQuery}`
      };
    }

    function moneyRange(day) {
      const values = day.places.map(place => place.budget.replace("€", ""));
      return `€${values[0]} / 保底 ${day.places[2].budget}`;
    }

    function render() {
      const select = document.getElementById("daySelect");
      const daysEl = document.getElementById("days");
      const summaryEl = document.getElementById("summary");

      select.innerHTML = days.map(day => `<option value="day-${day.day}">Day ${day.day}｜${day.city}（${day.cityZh}）</option>`).join("");

      daysEl.innerHTML = days.map(day => `
        <article class="day-card" id="day-${day.day}">
          <header class="day-head">
            <div>
              <h2 class="day-title">Day ${day.day}｜${day.city}（${day.cityZh}）</h2>
              <div class="country">${day.country}</div>
            </div>
            <a class="button quick-main" href="${day.places[0].navUrl}" target="_blank" rel="noopener">主餐廳導航</a>
          </header>
          <div class="places">
            ${day.places.map(place => renderPlace(place)).join("")}
          </div>
        </article>
      `).join("");

      summaryEl.innerHTML = `
        <div class="notice">總覽用來出發前快速核對；現場使用請切回日期卡片。</div>
        ${days.map(day => `
          <article class="summary-card">
            <h2>Day ${day.day}｜${day.city}（${day.cityZh}）</h2>
            <div class="summary-grid">
              <div><b>Main:</b> ${day.places[0].name}</div>
              <div><b>Backup:</b> ${day.places[1].name}</div>
              <div><b>Emergency:</b> ${day.places[2].name}</div>
              <div><b>Budget:</b> ${moneyRange(day)}</div>
            </div>
          </article>
        `).join("")}
      `;
    }

    function renderPlace(place) {
      return `
        <section class="place ${place.role === "main" ? "main" : ""}">
          <div class="role">
            <span>${roleLabels[place.role]}</span>
            <span class="fit">亞洲口味 ${place.fit}</span>
          </div>
          <h3 class="name">${place.name}</h3>
          <div class="meta">${place.city}, ${place.country}</div>
          <div class="chips">
            ${place.recommended.map(item => `<span class="chip">${item}</span>`).join("")}
          </div>
          <div class="details">
            <div><b>份量:</b> ${place.portion}</div>
            <div><b>每人預估:</b> ${place.budget}</div>
            <div><b>地址:</b> ${place.address}</div>
          </div>
          <div class="actions">
            <a class="button nav-btn" href="${place.navUrl}" target="_blank" rel="noopener">導航</a>
            <a class="button search-btn" href="${place.searchUrl}" target="_blank" rel="noopener">地圖搜尋</a>
          </div>
        </section>
      `;
    }

    render();

    const select = document.getElementById("daySelect");
    select.addEventListener("change", () => {
      document.getElementById("summary").classList.remove("active");
      document.getElementById("days").classList.remove("hidden");
      document.getElementById("summaryToggle").textContent = "總覽";
      document.getElementById(select.value).scrollIntoView({ block: "start" });
    });

    document.getElementById("summaryToggle").addEventListener("click", event => {
      const summary = document.getElementById("summary");
      const daysList = document.getElementById("days");
      const showing = summary.classList.toggle("active");
      daysList.classList.toggle("hidden", showing);
      event.currentTarget.textContent = showing ? "卡片" : "總覽";
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  </script>
</body>
</html>
