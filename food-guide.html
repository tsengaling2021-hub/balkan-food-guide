<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFF8EA">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Balkan Food">
  <link rel="manifest" href='data:application/manifest+json,{"name":"Balkan Food Guide 2026","short_name":"Balkan Food","start_url":"./food-guide.html","display":"standalone","background_color":"#FFF8EA","theme_color":"#FFF8EA"}'>
  <title>Balkan Food Guide 2026 - iPhone Edition</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fff8ea;
      --paper: #fffdf7;
      --panel: #fffdf7;
      --panel-2: #f7ead2;
      --line: #eadcc4;
      --text: #2b2118;
      --muted: #766957;
      --soft: #4f4436;
      --accent: #2f80ed;
      --accent-2: #c96a3d;
      --danger: #b4533c;
      --ok: #4f8a45;
      --theme: #c96a3d;
      --theme-soft: rgba(201, 106, 61, .14);
      --shadow: 0 14px 34px rgba(88, 62, 35, .15);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
    }

    * { box-sizing: border-box; }

    html {
      background: var(--bg);
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(201, 106, 61, .18), transparent 310px),
        linear-gradient(180deg, #fff2d7 0, rgba(255, 248, 234, 0) 280px),
        var(--bg);
      color: var(--text);
      font-size: 17px;
      line-height: 1.45;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    a { color: inherit; }

    button, a.button {
      min-height: 48px;
      border: 0;
      border-radius: 16px;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .app {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 14px 14px 28px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: -14px -14px 12px;
      padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
      background: rgba(255, 248, 234, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      color: #332416;
      letter-spacing: 0;
      line-height: 1.15;
    }

    .offline {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 5px 9px;
      border: 1px solid rgba(139, 214, 111, .42);
      border-radius: 999px;
      color: var(--ok);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .jump-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .day-select {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-size: 18px;
      font-weight: 800;
      padding: 0 12px;
    }

    .summary-toggle {
      min-width: 76px;
      padding: 0 12px;
      background: #efe0c6;
      color: var(--text);
    }

    .notice {
      border: 1px solid rgba(246, 196, 83, .34);
      background: #fff3cf;
      color: #6f4a17;
      border-radius: 18px;
      padding: 10px 12px;
      margin: 12px 0;
      font-size: 15px;
      font-weight: 650;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0;
    }

    .mode-btn {
      min-height: 52px;
      background: #f2e3ca;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .mode-btn.active {
      background: var(--accent-2);
      color: #ffffff;
      border-color: #60a5fa;
    }

    body.free-mode .tour-section,
    body.tour-mode .free-section {
      display: none;
    }

    .moments {
      border: 1px solid var(--line);
      background: var(--paper);
      border-radius: 22px;
      padding: 12px;
      margin: 12px 0 14px;
    }

    .moments h2 {
      margin: 0 0 8px;
      font-size: 19px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .moment-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
      color: var(--soft);
      font-size: 16px;
      font-weight: 800;
    }

    .moment-item {
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    .moment-item:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .moment-title {
      color: var(--text);
      font-size: 18px;
      font-weight: 950;
    }

    .moment-restaurant {
      margin: 4px 0 9px;
      color: var(--accent-2);
      font-size: 17px;
      font-weight: 900;
    }

    .today-planner {
      border: 1px solid var(--line);
      background: var(--paper);
      border-radius: 24px;
      padding: 12px;
      margin: 12px 0 14px;
      box-shadow: var(--shadow);
    }

    .today-planner h2 {
      margin: 0 0 10px;
      font-size: 21px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .home-entry-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .home-entry,
    .today-tab {
      min-height: 50px;
      background: #f3e5cf;
      color: var(--text);
      border: 1px solid #e5d2b6;
      padding: 0 8px;
      font-size: 15px;
    }

    .home-entry.active,
    .today-tab.active {
      background: var(--accent-2);
      color: #ffffff;
      border-color: #60a5fa;
    }

    .home-section {
      display: none;
      margin-top: 10px;
    }

    .home-section.active {
      display: block;
    }

    .home-section-title {
      margin: 0 0 10px;
      color: #ffe08a;
      font-size: 20px;
      font-weight: 950;
      line-height: 1.2;
    }

    .home-actions {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .today-card {
      border: 1px solid color-mix(in srgb, var(--theme), white 58%);
      border-radius: 24px;
      background:
        linear-gradient(135deg, var(--theme-soft), rgba(255, 255, 255, .88)),
        var(--paper);
      padding: 12px;
      margin-bottom: 10px;
    }

    .today-day {
      color: var(--theme);
      font-size: 22px;
      font-weight: 950;
      line-height: 1.12;
      margin-bottom: 8px;
    }

    .today-restaurant {
      color: var(--text);
      font-size: 25px;
      font-weight: 950;
      line-height: 1.12;
      margin-bottom: 10px;
    }

    .today-section {
      margin: 10px 0;
    }

    .today-label {
      color: var(--theme);
      font-size: 16px;
      font-weight: 950;
      margin-bottom: 5px;
    }

    .today-list {
      display: grid;
      gap: 4px;
      margin: 0;
      padding-left: 20px;
      color: var(--text);
      font-size: 17px;
      font-weight: 820;
    }

    .today-budget {
      color: var(--theme);
      font-size: 20px;
      font-weight: 950;
      margin: 12px 0;
    }

    .today-ended {
      color: var(--text);
      font-size: 20px;
      font-weight: 900;
      line-height: 1.35;
    }

    .today-ended span {
      display: block;
      color: var(--muted);
      font-size: 16px;
      font-weight: 760;
      margin-top: 6px;
    }

    .must-eat-label {
      color: var(--theme);
      font-size: 18px;
      font-weight: 950;
      margin: 10px 0 6px;
    }

    .food-finder {
      border: 1px solid var(--line);
      background: var(--paper);
      border-radius: 24px;
      padding: 12px;
      margin: 12px 0 14px;
    }

    .food-finder h2 {
      margin: 0 0 4px;
      font-size: 21px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .finder-subtitle {
      color: var(--muted);
      font-size: 15px;
      font-weight: 760;
      margin-bottom: 10px;
    }

    .finder-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .finder-btn {
      min-height: 50px;
      padding: 0 8px;
      background: #f3e5cf;
      color: var(--text);
      border: 1px solid var(--line);
      font-size: 15px;
      font-weight: 900;
    }

    .finder-btn.active {
      background: var(--accent);
      color: #ffffff;
      border-color: #60a5fa;
    }

    .finder-results {
      display: grid;
      gap: 10px;
    }

    .finder-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fffaf0;
      padding: 12px;
    }

    .finder-name {
      margin: 0 0 3px;
      color: var(--text);
      font-size: 21px;
      font-weight: 950;
      line-height: 1.16;
    }

    .finder-meta {
      color: var(--muted);
      font-size: 15px;
      font-weight: 750;
      margin-bottom: 8px;
    }

    .finder-budget {
      color: var(--accent-2);
      font-size: 17px;
      font-weight: 950;
      margin-bottom: 8px;
    }

    .location-tools {
      display: grid;
      gap: 8px;
      margin: 10px 0 12px;
    }

    .city-select {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-weight: 800;
      padding: 0 12px;
    }

    .location-note {
      color: var(--muted);
      font-size: 14px;
      font-weight: 760;
    }

    .distance-pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(45, 212, 191, .14);
      color: var(--accent);
      font-size: 13px;
      font-weight: 900;
      margin-left: 6px;
    }

    .distance-line {
      color: var(--accent);
      font-size: 18px;
      font-weight: 950;
      margin: 4px 0 10px;
    }

    .ranking-note {
      color: var(--muted);
      font-size: 14px;
      font-weight: 760;
      margin: 0 0 10px;
    }

    .stars {
      color: #d99000;
      font-weight: 950;
    }

    .alt-box {
      margin: 12px 12px 0;
      border: 1px solid color-mix(in srgb, var(--theme), white 58%);
      border-radius: 20px;
      background: var(--theme-soft);
      padding: 12px;
    }

    .alt-title {
      color: var(--theme);
      font-size: 17px;
      font-weight: 950;
      margin-bottom: 6px;
    }

    .alt-name {
      color: var(--text);
      font-size: 20px;
      font-weight: 950;
      margin-bottom: 8px;
    }

    .day-card {
      scroll-margin-top: 118px;
      margin: 14px 0;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .day-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 16px 14px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, var(--theme-soft), #fffaf0);
    }

    .day-title {
      margin: 0;
      font-size: 25px;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .country {
      margin-top: 4px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
    }

    .quick-main {
      flex: 0 0 auto;
      min-width: 112px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      background: var(--theme);
      color: #ffffff;
    }

    .places {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .highlight {
      margin: 12px 12px 0;
      border: 1px solid color-mix(in srgb, var(--theme), white 55%);
      border-radius: 20px;
      background: linear-gradient(180deg, var(--theme-soft), rgba(255, 255, 255, .86));
      color: var(--text);
      padding: 12px;
    }

    .highlight.priority {
      border-color: var(--theme);
      box-shadow: inset 5px 0 0 var(--theme);
    }

    .highlight-title {
      margin: 0 0 8px;
      color: var(--theme);
      font-size: 19px;
      font-weight: 950;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .highlight-restaurant {
      margin: 0 0 4px;
      color: var(--text);
      font-size: 25px;
      font-weight: 950;
      line-height: 1.14;
      letter-spacing: 0;
    }

    .highlight-location {
      color: var(--theme);
      font-size: 17px;
      font-weight: 850;
      margin-bottom: 10px;
    }

    .highlight-foods {
      display: grid;
      gap: 5px;
      color: var(--text);
      font-size: 19px;
      font-weight: 900;
      margin: 10px 0;
    }

    .highlight-budget {
      color: var(--theme);
      font-size: 20px;
      font-weight: 950;
      margin: 10px 0;
    }

    .highlight-note {
      color: var(--soft);
      font-size: 15px;
      font-weight: 760;
      margin: 8px 0 12px;
    }

    .primary-nav {
      width: 100%;
      min-height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      font-size: 18px;
      font-weight: 950;
      text-decoration: none;
    }

    .order-guide {
      margin-top: 12px;
      border: 1px solid rgba(246, 196, 83, .42);
      border-radius: 18px;
      background: #fff6df;
      overflow: hidden;
    }

    .order-guide summary {
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      background: #ead8b9;
      color: var(--text);
      cursor: pointer;
      font-size: 18px;
      font-weight: 950;
      list-style: none;
      -webkit-tap-highlight-color: transparent;
    }

    .order-guide summary::-webkit-details-marker {
      display: none;
    }

    .order-body {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .dish-card {
      border-top: 1px solid rgba(255, 255, 255, .14);
      padding-top: 10px;
    }

    .dish-card:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .dish-line {
      color: var(--text);
      font-size: 17px;
      font-weight: 850;
      line-height: 1.32;
    }

    .sharing-box {
      border-top: 1px solid rgba(255, 255, 255, .16);
      padding-top: 10px;
    }

    .sharing-title {
      color: var(--theme);
      font-size: 17px;
      font-weight: 950;
      margin-bottom: 6px;
    }

    .sharing-list {
      display: grid;
      gap: 4px;
      margin: 0;
      padding-left: 20px;
      color: var(--text);
      font-size: 16px;
      font-weight: 780;
    }

    .photo-btn {
      width: 100%;
      min-height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 8px;
      padding: 0 14px;
      border-radius: 8px;
      background: #806f5c;
      color: #ffffff;
      font-size: 17px;
      font-weight: 900;
      text-decoration: none;
    }

    .place {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fffaf0;
      padding: 12px;
    }

    .place.main {
      border-color: color-mix(in srgb, var(--theme), white 45%);
      background: var(--theme-soft);
    }

    .role {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--accent-2);
      font-size: 14px;
      font-weight: 900;
    }

    .fit {
      color: var(--text);
      font-size: 13px;
      font-weight: 850;
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .1);
      white-space: nowrap;
    }

    .name {
      margin: 0 0 3px;
      font-size: 22px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .meta {
      color: var(--muted);
      font-size: 15px;
      font-weight: 650;
      margin-bottom: 10px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
    }

    .chip {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border-radius: 999px;
      background: #f0e2c8;
      color: var(--soft);
      font-size: 14px;
      font-weight: 800;
    }

    .details {
      display: grid;
      gap: 5px;
      margin: 10px 0 12px;
      color: var(--soft);
      font-size: 15px;
    }

    .details b { color: var(--text); }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .nav-btn {
      width: 100%;
      min-height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      background: var(--accent);
      color: #ffffff;
    }

    .search-btn {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      background: #f3e5cf;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .summary {
      display: none;
      margin-top: 12px;
    }

    .summary.active { display: block; }
    .days.hidden { display: none; }

    .summary-card {
      margin: 10px 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px;
    }

    .summary-card h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .summary-grid {
      display: grid;
      gap: 5px;
      color: var(--soft);
      font-size: 15px;
    }

    .summary-grid b { color: var(--text); }

    .footer {
      color: var(--muted);
      font-size: 13px;
      padding: 18px 2px 4px;
    }

    @media (max-width: 390px) {
      .app { padding-left: 10px; padding-right: 10px; }
      .topbar { margin-left: -10px; margin-right: -10px; padding-left: 10px; padding-right: 10px; }
      .day-title { font-size: 23px; }
      .quick-main { min-width: 98px; }
      .name { font-size: 20px; }
    }
  </style>
</head>
<body class="tour-mode">
  <main class="app">
    <header class="topbar">
      <div class="title-row">
        <h1>Balkan Food Guide 2026</h1>
        <span class="offline">離線可看</span>
      </div>
      <div class="jump-row">
        <select class="day-select" id="daySelect" aria-label="選擇日期"></select>
        <button class="summary-toggle" id="summaryToggle" type="button">總覽</button>
      </div>
    </header>

    <section class="notice">
      旅行中先按每張卡右上角「主餐廳導航」。網路不穩時仍可看店名、餐點和地址；導航會交給 Google Maps。
    </section>

    <section class="mode-switch" aria-label="Travel Companion Mode">
      <button class="mode-btn active" id="tourModeBtn" type="button">跟團模式</button>
      <button class="mode-btn" id="freeModeBtn" type="button">自由行模式</button>
    </section>

    <section class="today-planner tour-section" aria-label="找吃的首頁入口">
      <h2>🍽 找吃的</h2>
      <div class="home-entry-grid" role="group" aria-label="找吃的入口">
        <button class="home-entry active" type="button" data-home-section="nearbyPanel">📍 附近找吃的</button>
        <button class="home-entry" type="button" data-home-section="todayPanel">📅 今天吃什麼</button>
        <button class="home-entry" type="button" data-home-section="tomorrowPanel">📅 明天吃什麼</button>
        <button class="home-entry" type="button" data-home-section="rankingPanel">🏆 必吃排行榜</button>
      </div>
      <section class="home-section active" id="nearbyPanel">
        <h3 class="home-section-title">📍 附近找吃的</h3>
        <div class="location-tools">
          <button class="primary-nav" id="homeLocationBtn" type="button">📍 使用我的位置</button>
          <div class="location-note" id="homeLocationNote">請先按定位，結果才會依目前位置由近到遠排序。</div>
        </div>
        <div class="finder-buttons" id="homeFinderButtons"></div>
        <div class="finder-results" id="homeFinderResults"></div>
      </section>
      <section class="home-section" id="todayPanel"></section>
      <section class="home-section" id="tomorrowPanel"></section>
      <section class="home-section" id="rankingPanel"></section>
      <div class="home-actions">
        <button class="today-tab" id="allBtn" type="button">查看 Day 2～Day 14 全部日期</button>
      </div>
    </section>

    <section class="food-finder free-section" aria-label="Food Finder">
      <h2>🍴 Food Finder</h2>
      <div class="finder-subtitle">🍴 我現在想吃什麼？請先使用定位，結果會先依距離排序。</div>
      <div class="location-tools">
        <button class="primary-nav" id="useLocationBtn" type="button">📍 使用我的位置</button>
        <select class="city-select" id="citySelect" aria-label="選擇城市"></select>
        <div class="location-note" id="locationNote">使用定位後會依距離排序；若拒絕定位，請選擇城市。</div>
      </div>
      <div class="finder-buttons" id="finderButtons"></div>
      <div class="finder-results" id="finderResults"></div>
    </section>

    <section class="moments tour-section" id="moments" aria-label="Top 5 Food Moments"></section>

    <section class="days tour-section" id="days"></section>
    <section class="summary tour-section" id="summary" aria-label="總覽表"></section>

    <footer class="footer">
      Google Maps 導航連結格式：Current Location → 餐廳。營業時間和臨時休店請到現場前再用 Google Maps 確認。
    </footer>
  </main>

  <script>
    let guideData = null;
    let days = [];

    const roleLabels = {
      main: "主推薦餐廳",
      backup: "備案餐廳",
      emergency: "保底餐廳",
      cafe: "咖啡店"
    };

    const finderCategories = [
      { key: "seafood", label: "🐟 海鮮", limit: 8 },
      { key: "pasta", label: "🍝 義大利麵", limit: 8 },
      { key: "meat", label: "🥩 烤肉", limit: 8 },
      { key: "dessert", label: "🍰 甜點", limit: 8 },
      { key: "cafe", label: "☕ 咖啡", limit: 8 }
    ];

    let userLocation = null;
    let selectedCity = "";
    let activeFinderKey = "seafood";
    let activeHomeFinderKey = "seafood";

    async function loadGuideData() {
      const response = await fetch("data/restaurants.json", { cache: "no-store" });
      if (!response.ok) throw new Error("restaurants.json 載入失敗");
      guideData = await response.json();
      days = Object.values(guideData.days)
        .sort((a, b) => a.day - b.day)
        .map(normalizeDay);
    }

    function normalizeDay(day) {
      return {
        ...day,
        theme: countryTheme(day.country),
        places: day.restaurants.map(place => {
          const query = `${place.name} ${place.city} ${place.country}`;
          const mapsQuery = encodeURIComponent(query).replace(/%20/g, "+");
          return {
            ...place,
            coordinates: place.coordinates || day.coordinates || null,
            searchUrl: `https://www.google.com/maps/search/?api=1&query=${mapsQuery}`,
            navUrl: `https://www.google.com/maps/dir/?api=1&destination=${mapsQuery}`
          };
        })
      };
    }

    function countryTheme(country) {
      const themes = {
        Italy: { color: "#C96A3D", soft: "rgba(201, 106, 61, .16)", flag: "🇮🇹" },
        Slovenia: { color: "#5FA8D3", soft: "rgba(95, 168, 211, .18)", flag: "🇸🇮" },
        Bosnia: { color: "#3E8E8E", soft: "rgba(62, 142, 142, .18)", flag: "🇧🇦" },
        "Bosnia and Herzegovina": { color: "#3E8E8E", soft: "rgba(62, 142, 142, .18)", flag: "🇧🇦" },
        Croatia: { color: "#2F80ED", soft: "rgba(47, 128, 237, .16)", flag: "🇭🇷" }
      };
      return themes[country] || { color: "#C96A3D", soft: "rgba(201, 106, 61, .16)", flag: "🧭" };
    }

    function themeStyle(day) {
      return `style="--theme:${day.theme.color};--theme-soft:${day.theme.soft}"`;
    }

    function dateForDay(dayNumber) {
      const date = new Date(`${guideData.tripStart}T00:00:00`);
      date.setDate(date.getDate() + dayNumber - 2);
      return date;
    }

    function dateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function dayForOffset(offset) {
      const firstDate = dateForDay(days[0].day);
      const lastDate = dateForDay(days[days.length - 1].day);
      const target = new Date();
      target.setHours(0, 0, 0, 0);
      target.setDate(target.getDate() + offset);

      if (target > lastDate) return null;
      if (target < firstDate) return days[offset === 0 ? 0 : 1] || days[0];

      const key = dateKey(target);
      return days.find(day => dateKey(dateForDay(day.day)) === key) || null;
    }

    function placeForHighlight(day) {
      return day.places.find(place => place.name === day.highlight.name) || day.places[0];
    }

    function imageSearchUrl(place, guide) {
      const firstDish = guide?.dishes?.[0]?.en || guide?.recommended?.[0]?.en || place.recommended[0] || place.name;
      const query = `${firstDish} ${place.name} ${place.city}`;
      return `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(query).replace(/%20/g, "+")}`;
    }

    function allRestaurants() {
      return days.flatMap(day => day.places.map(place => ({ ...place, day })));
    }

    function distanceKm(from, to) {
      if (!from || !to) return null;
      const radius = 6371;
      const lat1 = from.lat * Math.PI / 180;
      const lat2 = to.lat * Math.PI / 180;
      const dLat = (to.lat - from.lat) * Math.PI / 180;
      const dLng = (to.lng - from.lng) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
      return radius * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatDistance(km) {
      if (km == null) return "";
      if (km < 1) return `距離 ${Math.round(km * 1000)}m`;
      return `距離 ${km.toFixed(1)}km`;
    }

    function finderRecommendations(item) {
      const guide = item.orderGuide || item.day.highlight;
      if (guide?.recommended?.length) {
        return guide.recommended.slice(0, 3).map(dish => `${dish.en}${dish.zh ? `｜${dish.zh}` : ""}`);
      }
      if (guide?.dishes?.length) {
        return guide.dishes.slice(0, 3).map(dish => `${dish.en}｜${dish.zh}`);
      }
      return item.recommended.slice(0, 3);
    }

    function renderCityOptions() {
      const select = document.getElementById("citySelect");
      const cities = [...new Map(days.map(day => [day.city, day])).values()];
      select.innerHTML = `<option value="">請選擇城市</option>` + cities.map(day => `
        <option value="${day.city}">${day.city}（${day.cityZh}）</option>
      `).join("");
    }

    function finderMatches(activeKey, origin, allowCityFallback = false) {
      const category = finderCategories.find(item => item.key === activeKey) || finderCategories[0];
      let matches = allRestaurants()
        .filter(item => item.finderTags?.includes(category.key))
        .map(item => ({ ...item, distance: distanceKm(origin, item.coordinates) }));

      if (allowCityFallback && selectedCity && !userLocation) {
        matches = matches.filter(item => item.city === selectedCity || item.day.city === selectedCity);
      }

      return matches
        .sort((a, b) => {
          if (a.distance == null && b.distance == null) return a.day.day - b.day.day;
          if (a.distance == null) return 1;
          if (b.distance == null) return -1;
          return a.distance - b.distance;
        })
        .slice(0, category.limit);
    }

    function renderFinderButtons(buttons, activeKey, attributeName) {
      buttons.innerHTML = finderCategories.map(item => `
        <button class="finder-btn ${item.key === activeKey ? "active" : ""}" type="button" ${attributeName}="${item.key}">
          ${item.label}
        </button>
      `).join("");
    }

    function renderFinderResults(results, matches, needsLocationText) {
      results.innerHTML = matches.length ? matches.map(item => `
        <article class="finder-card" ${themeStyle(item.day)}>
          <h3 class="finder-name">${item.name}</h3>
          <div class="finder-meta">Day ${item.day.day}｜${item.city}</div>
          ${item.distance != null ? `<div class="distance-line">${formatDistance(item.distance)}</div>` : ""}
          <div class="finder-budget">${item.budget}</div>
          <div class="today-section">
            <div class="today-label">推薦:</div>
            <ul class="today-list">${finderRecommendations(item).map(dish => `<li>${dish}</li>`).join("")}</ul>
          </div>
          <a class="button primary-nav" href="${item.navUrl}">導航</a>
        </article>
      `).join("") : `
        <div class="today-card">
          <div class="today-ended">${needsLocationText}<span>為避免列出全巴爾幹餐廳，Food Finder 會等定位後才顯示結果。</span></div>
        </div>
      `;
    }

    function renderHomeFinder(activeKey = activeHomeFinderKey) {
      activeHomeFinderKey = activeKey;
      renderFinderButtons(document.getElementById("homeFinderButtons"), activeKey, "data-home-finder");
      const matches = userLocation ? finderMatches(activeKey, userLocation, false) : [];
      renderFinderResults(document.getElementById("homeFinderResults"), matches, "請先按「使用我的位置」");
    }

    function renderFoodFinder(activeKey = activeFinderKey) {
      activeFinderKey = activeKey;
      renderFinderButtons(document.getElementById("finderButtons"), activeKey, "data-finder");
      const origin = userLocation || (selectedCity ? days.find(day => day.city === selectedCity)?.coordinates : null);
      const matches = origin ? finderMatches(activeKey, origin, Boolean(selectedCity)) : [];
      renderFinderResults(document.getElementById("finderResults"), matches, userLocation ? "沒有符合條件的餐廳" : "請先按「使用我的位置」");
    }

    function useMyLocation() {
      const note = document.getElementById("locationNote");
      const homeNote = document.getElementById("homeLocationNote");
      if (!navigator.geolocation) {
        note.textContent = "此裝置不支援定位，請選擇城市。";
        homeNote.textContent = "此裝置不支援定位。";
        return;
      }
      note.textContent = "正在取得位置...";
      homeNote.textContent = "正在取得位置...";
      navigator.geolocation.getCurrentPosition(position => {
        userLocation = {
          lat: position.coords.latitude,
          lng: position.coords.longitude
        };
        selectedCity = "";
        document.getElementById("citySelect").value = "";
        note.textContent = "已使用目前位置，結果依距離排序。";
        homeNote.textContent = "已使用目前位置，附近餐廳已由近到遠排序。";
        renderHomeFinder(activeHomeFinderKey);
        renderFoodFinder(activeFinderKey);
      }, () => {
        userLocation = null;
        note.textContent = "請選擇城市。";
        homeNote.textContent = "定位被拒絕，請到自由行模式選擇城市。";
        renderHomeFinder(activeHomeFinderKey);
      }, { enableHighAccuracy: true, timeout: 8000, maximumAge: 300000 });
    }

    function setTravelMode(mode) {
      document.body.classList.toggle("tour-mode", mode === "tour");
      document.body.classList.toggle("free-mode", mode === "free");
      document.getElementById("tourModeBtn").classList.toggle("active", mode === "tour");
      document.getElementById("freeModeBtn").classList.toggle("active", mode === "free");
      if (mode === "free") renderFoodFinder(activeFinderKey);
    }

    function showHomeSection(sectionId) {
      document.querySelectorAll(".home-entry").forEach(button => {
        button.classList.toggle("active", button.dataset.homeSection === sectionId);
      });
      document.querySelectorAll(".home-section").forEach(section => {
        section.classList.toggle("active", section.id === sectionId);
      });
      if (sectionId === "nearbyPanel") renderHomeFinder(activeHomeFinderKey);
    }

    function setHomeMode(mode) {
      document.getElementById("allBtn").classList.toggle("active", mode === "all");

      if (mode === "all") {
        document.getElementById("todayPanel").innerHTML = `
          <div class="today-card">
            <div class="today-ended">全部日期<span>下方可查看 Day 2～Day 14 所有餐廳與導航。</span></div>
          </div>
        `;
        document.getElementById("days").classList.remove("hidden");
        document.getElementById("summary").classList.remove("active");
        document.getElementById("summaryToggle").textContent = "總覽";
        document.getElementById("days").scrollIntoView({ block: "start" });
        return;
      }
      renderHomeHighlights();
    }

    function renderHomeHighlights() {
      document.getElementById("allBtn").classList.remove("active");
      document.getElementById("todayPanel").innerHTML = `<h3 class="home-section-title">📅 今天吃什麼？</h3>${renderQuickDay(0, "今天吃什麼")}`;
      document.getElementById("tomorrowPanel").innerHTML = `<h3 class="home-section-title">📅 明天吃什麼？</h3>${renderQuickDay(1, "明天吃什麼")}`;
      document.getElementById("rankingPanel").innerHTML = renderRanking();
    }

    function renderQuickDay(offset, title) {
      const day = dayForOffset(offset);

      if (!day) {
        return `
          <div class="today-card">
            <div class="today-day">${title}</div>
            <div class="today-ended">行程已結束<span>可從下方查看全部日期。</span></div>
          </div>
        `;
      }

      const place = placeForHighlight(day);
      const guide = day.highlight;
      return `
        <div class="today-card" ${themeStyle(day)}>
          <div class="today-label">${title}</div>
          <div class="today-day">${day.theme.flag} Day ${day.day}｜${day.city}（${day.cityZh}）</div>
          <div class="today-restaurant">${day.highlight.name}</div>
          <div class="must-eat-label">🌟 今日必吃</div>
          <div class="today-section">
            <div class="today-label">推薦:</div>
            <ul class="today-list">${guide.recommended.map(item => `<li>${item.en}｜${item.zh}</li>`).join("")}</ul>
          </div>
          <div class="today-section">
            <div class="today-label">四人分食:</div>
            <ul class="today-list">${guide.sharing.map(item => `<li>${item}</li>`).join("")}</ul>
          </div>
          <div class="today-budget">${guide.perPerson}</div>
          ${renderOrderGuide(place, { dishes: guide.recommended, sharing: guide.sharing, perPerson: guide.perPerson })}
          <a class="photo-btn" href="${imageSearchUrl(place, guide)}">查看餐點照片</a>
          <a class="button primary-nav" href="${place.navUrl}">導航前往</a>
        </div>
      `;
    }

    function moneyRange(day) {
      return day.places[2] ? `${day.places[0].budget} / 保底 ${day.places[2].budget}` : day.places[0].budget;
    }

    function render() {
      const select = document.getElementById("daySelect");
      const daysEl = document.getElementById("days");
      const summaryEl = document.getElementById("summary");
      const momentsEl = document.getElementById("moments");

      select.innerHTML = days.map(day => `<option value="day-${day.day}">Day ${day.day}｜${day.city}（${day.cityZh}）</option>`).join("");
      renderCityOptions();
      momentsEl.innerHTML = renderMoments();
      renderFoodFinder(activeFinderKey);
      renderHomeFinder(activeHomeFinderKey);
      renderHomeHighlights();

      daysEl.innerHTML = days.map(day => `
        <article class="day-card" id="day-${day.day}" ${themeStyle(day)}>
          <header class="day-head">
            <div>
              <h2 class="day-title">${day.theme.flag} Day ${day.day}｜${day.city}（${day.cityZh}）</h2>
              <div class="country">${day.country}</div>
            </div>
            <a class="button quick-main" href="${day.places[0].navUrl}">主餐廳導航</a>
          </header>
          ${renderHighlight(day)}
          ${renderAlternative(day)}
          <div class="places">
            ${day.places.map(place => renderPlace(place)).join("")}
          </div>
        </article>
      `).join("");

      summaryEl.innerHTML = `
        <div class="notice">總覽用來出發前快速核對；現場使用請切回日期卡片。</div>
        ${days.map(day => `
          <article class="summary-card" ${themeStyle(day)}>
            <h2>Day ${day.day}｜${day.city}（${day.cityZh}）</h2>
            <div class="summary-grid">
              <div><b>Main:</b> ${day.places[0].name}</div>
              <div><b>Backup:</b> ${day.places[1].name}</div>
              <div><b>Emergency:</b> ${day.places[2]?.name || "未設定"}</div>
              <div><b>Budget:</b> ${moneyRange(day)}</div>
            </div>
          </article>
        `).join("")}
      `;
    }

    function renderAlternative(day) {
      const backup = day.places.find(place => place.role === "backup") || day.places[1];
      if (!backup) return "";
      return `
        <section class="alt-box">
          <div class="alt-title">若客滿：👉 立即替代方案</div>
          <div class="alt-name">${backup.name}</div>
          <div class="finder-meta">${backup.city}｜${backup.budget}</div>
          <a class="button primary-nav" href="${backup.navUrl}">導航前往</a>
        </section>
      `;
    }

    function renderMoments() {
      return renderRanking("Top Food Moments");
    }

    function renderRanking(title = "🏆 巴爾幹必吃排行榜") {
      const topDays = days
        .filter(day => day.foodHighlight)
        .sort((a, b) => (b.foodHighlight.rating || 0) - (a.foodHighlight.rating || 0))
        .slice(0, 8);
      return `
        <h2>${title}</h2>
        <p class="ranking-note">依 foodHighlight 評分產生，資料仍全部來自 restaurants.json。</p>
        <ol class="moment-list">
          ${topDays.map((day, index) => {
            const place = placeForHighlight(day);
            return `
              <li class="moment-item" ${themeStyle(day)}>
                <div class="moment-title">${index + 1}. ${day.theme.flag} ${day.foodHighlight.title}</div>
                <div class="moment-restaurant">${day.highlight.name}</div>
                <div class="finder-meta">${day.city}（${day.cityZh}）｜<span class="stars">${"★".repeat(day.foodHighlight.rating || 1)}</span></div>
                <a class="button primary-nav" href="${place.navUrl}">導航</a>
              </li>
            `;
          }).join("")}
        </ol>
      `;
    }

    function renderHighlight(day) {
      const highlight = day.highlight;
      const place = placeForHighlight(day);
      return `
        <section class="highlight ${highlight.priority ? "priority" : ""}">
          <h3 class="highlight-title">🌟 今日重點</h3>
          <div class="highlight-restaurant">${highlight.name}</div>
          <div class="highlight-location">📍 ${place.city}, ${place.country}</div>
          <div class="highlight-foods">${highlight.mustEat.map(item => `<div>${item}</div>`).join("")}</div>
          <div class="highlight-budget">💶 ${highlight.budget}</div>
          <div class="highlight-note">${highlight.note}</div>
          <a class="button primary-nav" href="${place.navUrl}">導航前往</a>
        </section>
      `;
    }

    function renderOrderGuide(place, guide) {
      return `
        <details class="order-guide">
          <summary>推薦吃什麼</summary>
          <div class="order-body">
            <div class="sharing-title">🍽️ 推薦怎麼點</div>
            ${guide.dishes.map(item => `
              <div class="dish-card">
                <div class="dish-line">🇬🇧 ${item.en}</div>
                <div class="dish-line">🇹🇼 ${item.zh}</div>
                <div class="dish-line">👭 ${item.portion}</div>
                <div class="dish-line">💶 ${item.price}</div>
              </div>
            `).join("")}
            <div class="sharing-box">
              <div class="sharing-title">👭 四人分食推薦</div>
              <ul class="sharing-list">${guide.sharing.map(item => `<li>${item}</li>`).join("")}</ul>
              <div class="today-budget">${guide.perPerson}</div>
            </div>
          </div>
        </details>
      `;
    }

    function renderPlace(place) {
      const guide = place.orderGuide;
      return `
        <section class="place ${place.role === "main" ? "main" : ""}">
          <div class="role">
            <span>${roleLabels[place.role]}</span>
            <span class="fit">亞洲口味 ${place.fit}</span>
          </div>
          <h3 class="name">${place.name}</h3>
          <div class="meta">${place.city}, ${place.country}</div>
          <div class="chips">
            ${place.recommended.map(item => `<span class="chip">${item}</span>`).join("")}
          </div>
          <div class="details">
            <div><b>份量:</b> ${place.portion}</div>
            <div><b>每人預估:</b> ${place.budget}</div>
            <div><b>地址:</b> ${place.address}</div>
          </div>
          ${guide ? renderOrderGuide(place, guide) : ""}
          ${guide ? `<a class="photo-btn" href="${imageSearchUrl(place, guide)}">查看餐點照片</a>` : ""}
          <div class="actions">
            <a class="button nav-btn" href="${place.navUrl}">${place.role === "main" || guide ? "導航前往" : "導航"}</a>
            <a class="button search-btn" href="${place.searchUrl}">地圖搜尋</a>
          </div>
        </section>
      `;
    }

    async function init() {
      try {
        await loadGuideData();
        render();
        bindEvents();
      } catch (error) {
        document.getElementById("todayPanel").innerHTML = `
          <div class="today-card">
            <div class="today-ended">資料載入失敗<span>請確認 data/restaurants.json 已上傳到 GitHub。若直接用 file:// 開啟，部分瀏覽器會阻擋 JSON 讀取。</span></div>
          </div>
        `;
        console.error(error);
      }
    }

    function bindEvents() {
      const select = document.getElementById("daySelect");
      select.addEventListener("change", () => {
        document.getElementById("summary").classList.remove("active");
        document.getElementById("days").classList.remove("hidden");
        document.getElementById("summaryToggle").textContent = "總覽";
        document.getElementById(select.value).scrollIntoView({ block: "start" });
      });

      document.getElementById("summaryToggle").addEventListener("click", event => {
        const summary = document.getElementById("summary");
        const daysList = document.getElementById("days");
        const showing = summary.classList.toggle("active");
        daysList.classList.toggle("hidden", showing);
        event.currentTarget.textContent = showing ? "卡片" : "總覽";
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      document.getElementById("allBtn").addEventListener("click", () => setHomeMode("all"));
      document.querySelector(".home-entry-grid").addEventListener("click", event => {
        const button = event.target.closest("[data-home-section]");
        if (button) showHomeSection(button.dataset.homeSection);
      });
      document.getElementById("tourModeBtn").addEventListener("click", () => setTravelMode("tour"));
      document.getElementById("freeModeBtn").addEventListener("click", () => setTravelMode("free"));
      document.getElementById("useLocationBtn").addEventListener("click", useMyLocation);
      document.getElementById("homeLocationBtn").addEventListener("click", useMyLocation);
      document.getElementById("citySelect").addEventListener("change", event => {
        selectedCity = event.target.value;
        userLocation = null;
        document.getElementById("locationNote").textContent = selectedCity ? "已依選擇城市篩選；可按使用我的位置改依距離排序。" : "請選擇城市。";
        renderFoodFinder(activeFinderKey);
      });
      document.getElementById("finderButtons").addEventListener("click", event => {
        const button = event.target.closest("[data-finder]");
        if (button) renderFoodFinder(button.dataset.finder);
      });
      document.getElementById("homeFinderButtons").addEventListener("click", event => {
        const button = event.target.closest("[data-home-finder]");
        if (button) renderHomeFinder(button.dataset.homeFinder);
      });
    }

    init();
  </script>
</body>
</html>
